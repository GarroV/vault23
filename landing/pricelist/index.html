<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricelist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #ffffff;
      --surface: #f8fafc;
      --border:  #e2e8f0;
      --text:    #0f172a;
      --muted:   #64748b;
      --accent:  #3b82f6;
      --dark:    #1e293b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
    }

    /* Screen chrome (hidden when printing) */
    .screen-only { }
    @media print {
      .screen-only { display: none !important; }
      body { background: #fff; }
      .sheet { box-shadow: none; max-width: 100%; margin: 0; padding: 2cm 2cm 2.5cm; }
    }

    /* Top bar */
    .topbar {
      background: var(--dark); color: #f1f5f9;
      padding: .75rem 1.5rem; display: flex; align-items: center; gap: 1rem;
    }
    .topbar .logo { font-size: 1.1rem; font-weight: 700; color: #60a5fa; }
    .btn-print {
      margin-left: auto; background: var(--accent); color: #fff; border: none;
      padding: .5rem 1rem; border-radius: .5rem; cursor: pointer; font-size: .875rem; font-weight: 600;
    }
    .btn-print:hover { opacity: .9; }

    /* Loading / error */
    #status {
      text-align: center; padding: 4rem; color: var(--muted); font-size: .95rem;
    }

    /* Sheet */
    .sheet {
      max-width: 820px; margin: 2rem auto; padding: 2rem 2rem 3rem;
      background: var(--bg); box-shadow: 0 2px 16px rgba(0,0,0,.08); border-radius: .75rem;
    }
    @media (max-width: 600px) {
      .sheet { margin: 1rem; padding: 1.25rem; border-radius: 0; }
    }

    /* Document header */
    .doc-header { margin-bottom: 2rem; }
    .ws-name { font-size: 1.5rem; font-weight: 700; }
    .doc-meta { font-size: .8rem; color: var(--muted); margin-top: .25rem; }
    .doc-title {
      font-size: 1rem; font-weight: 600; color: var(--muted); text-transform: uppercase;
      letter-spacing: .08em; margin-top: 1.5rem; padding-bottom: .5rem;
      border-bottom: 2px solid var(--dark);
    }

    /* Group */
    .group { margin-top: 1.75rem; }
    .group-name {
      font-size: .75rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); font-weight: 600; margin-bottom: .5rem;
      padding: .3rem 0; border-bottom: 1px solid var(--border);
    }

    /* Service rows */
    .service-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .5rem 1rem;
      padding: .6rem 0;
      border-bottom: 1px dashed var(--border);
      align-items: baseline;
    }
    .service-row:last-child { border-bottom: none; }
    .service-name { font-size: .9rem; font-weight: 500; }
    .service-desc { font-size: .78rem; color: var(--muted); margin-top: .15rem; grid-column: 1; }
    .service-price {
      font-size: .9rem; font-weight: 700; text-align: right; white-space: nowrap;
      grid-row: 1; grid-column: 2;
    }
    .service-unit { font-size: .75rem; color: var(--muted); display: block; text-align: right; }

    .empty { padding: 2rem; text-align: center; color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>

<!-- Top bar (screen only) -->
<div class="topbar screen-only">
  <span class="logo">Vault23</span>
  <span style="font-size:.875rem;color:#94a3b8">Pricelist</span>
  <button class="btn-print" onclick="window.print()">Print / Save PDF</button>
</div>

<div id="status">Loading pricelist…</div>
<div id="sheet-wrap" style="display:none"></div>

<script>
const API = 'https://orrlwzsvrliipcigmzfi.supabase.co/functions/v1';
const token = new URLSearchParams(location.search).get('token')
  || localStorage.getItem('vault23_token');

async function load() {
  if (!token) {
    document.getElementById('status').innerHTML =
      'No auth token. <a href="../cabinet/" style="color:#3b82f6">Log in via Cabinet</a> first.';
    return;
  }

  const r = await fetch(`${API}/cabinet-api/pricelist`, {
    headers: { Authorization: `Bearer ${token}` },
  });

  if (!r.ok) {
    if (r.status === 401) {
      document.getElementById('status').innerHTML =
        'Session expired. <a href="../cabinet/" style="color:#3b82f6">Log in again</a>.';
    } else {
      document.getElementById('status').textContent = 'Failed to load pricelist. Please try again.';
    }
    return;
  }

  const { services, workspaceName } = await r.json();

  document.getElementById('status').style.display = 'none';
  const wrap = document.getElementById('sheet-wrap');
  wrap.style.display = '';
  document.title = `Pricelist — ${workspaceName || 'Vault23'}`;

  if (!services || services.length === 0) {
    wrap.innerHTML = `<div class="sheet"><div class="empty">No services added yet. Use /addservice in the bot.</div></div>`;
    return;
  }

  // Group by contractor
  const groups = {};
  for (const s of services) {
    const g = s.contractor_name || 'General';
    if (!groups[g]) groups[g] = [];
    groups[g].push(s);
  }

  const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  const groupsHtml = Object.entries(groups).map(([gname, rows]) => {
    const rowsHtml = rows.map(s => {
      const price = s.price != null
        ? `${Number(s.price).toLocaleString('ru-RU')} ${s.currency || 'RUB'}`
        : '—';
      return `
        <div class="service-row">
          <div>
            <div class="service-name">${esc(s.name)}</div>
            ${s.description ? `<div class="service-desc">${esc(s.description)}</div>` : ''}
          </div>
          <div class="service-price">
            ${esc(price)}
            ${s.unit ? `<span class="service-unit">per ${esc(s.unit)}</span>` : ''}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="group">
        <div class="group-name">${esc(gname)}</div>
        ${rowsHtml}
      </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="sheet">
      <div class="doc-header">
        <div class="ws-name">${esc(workspaceName)}</div>
        <div class="doc-meta">Generated ${date}</div>
        <div class="doc-title">Price List</div>
      </div>
      ${groupsHtml}
    </div>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
</body>
</html>
